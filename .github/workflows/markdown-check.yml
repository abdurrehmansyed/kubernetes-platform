name: Markdown Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdown-check:
    name: Validate Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Markdown files
        id: markdown-files
        run: |
          if find . -name "*.md" -type f | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Display Markdown files
        if: steps.markdown-files.outputs.found == 'true'
        run: |
          echo "Markdown files found:"
          find . -name "*.md" -type f | sort

      - name: Basic Markdown validation
        if: steps.markdown-files.outputs.found == 'true'
        run: |
          echo "Running basic Markdown validation..."

          echo "Checking for trailing whitespace..."
          if grep -RIn --include="*.md" '[[:blank:]]$' .; then
            echo "Trailing whitespace found in Markdown files."
            exit 1
          fi

          echo "Checking for empty Markdown files..."
          empty_files=$(find . -name "*.md" -type f -empty)

          if [ -n "$empty_files" ]; then
            echo "Empty Markdown files found:"
            echo "$empty_files"
            exit 1
          fi

          echo "Markdown validation completed successfully."
